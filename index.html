<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Para mi Angie - No creas todo lo que dice tu cabecita">
    <title>For Angie</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">

    <style>
        /* ===== CSS RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #FCF9F5;
            --color-primary: #6C001B;
            --color-primary-light: #8C1D2F;
            --color-text-muted: #574142;
            --color-text-nav: rgba(28, 28, 26, 0.6);
            --color-footer-bg: #F0EDE9;
            --color-white: #ffffff;

            --font-serif: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--color-bg);
            font-family: var(--font-sans);
            color: var(--color-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== HEADER / NAVBAR ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(252, 249, 245, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(28, 28, 26, 0.04);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
        }

        .logo {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 400;
            font-size: 1.25rem;
            color: var(--color-primary-light);
            letter-spacing: 0.02em;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-link {
            font-family: var(--font-serif);
            font-size: 0.85rem;
            color: var(--color-text-nav);
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: color 0.3s ease, opacity 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--color-primary);
        }

        .nav-link.active {
            color: var(--color-primary-light);
            font-weight: 700;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 1.5px;
            background: var(--color-primary-light);
        }

        .nav-heart {
            color: var(--color-primary-light);
            font-size: 1.1rem;
            text-decoration: none;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
        }

        .nav-heart:hover {
            transform: scale(1.2);
        }

        .nav-heart svg {
            width: 20px;
            height: 20px;
            fill: var(--color-primary-light);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 85vh;
            display: flex;
            align-items: center;
            position: relative;
            padding: 80px 50px 80px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .hero-content {
            flex: 1;
            max-width: 55%;
            padding-right: 40px;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: clamp(3rem, 7vw, 5.5rem);
            color: var(--color-primary);
            line-height: 1.1;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 400;
            font-size: clamp(1rem, 2vw, 1.35rem);
            color: var(--color-text-muted);
            margin-bottom: 48px;
            line-height: 1.6;
            letter-spacing: 0.01em;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: var(--color-white);
            border: none;
            padding: 16px 36px;
            border-radius: 52px;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108, 0, 27, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-arrow {
            display: inline-flex;
            font-size: 1rem;
        }

        /* ===== HERO IMAGE ===== */
        .hero-image-wrapper {
            position: absolute;
            right: -60px;
            top: 50%;
            transform: translateY(-50%);
            width: 440px;
            height: 590px;
        }

        .hero-image-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #1e2e14;
            /* Organic blob-like shape – bottom trimmed to hide gray fringe */
            clip-path: path('M0 211.85C0 94.849 94.848 0 211.85 0C328.85 0 423.7 94.849 423.7 211.85V550C423.7 567 370 575 290 575C129.837 575 0 448 0 290V211.85Z');
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(28, 28, 26, 0.1);
        }

        .hero-image-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 4px solid var(--color-white);
            z-index: 2;
            clip-path: inherit;
            pointer-events: none;
        }

        .hero-image-border {
            position: absolute;
            inset: -4px;
            border: 4px solid var(--color-white);
            clip-path: path('M0 215.85C0 98.849 94.848 4 211.85 4C328.85 4 427.7 98.849 427.7 215.85V554C427.7 571 374 579 294 579C133.837 579 4 452 4 294V215.85Z');
            z-index: 1;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== FLOATING HEART ===== */
        .floating-heart {
            position: absolute;
            bottom: 80px;
            right: 400px;
            width: 73px;
            height: 73px;
            background: var(--color-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(108, 0, 27, 0.08);
            z-index: 10;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: heartPulse 2s ease-in-out infinite;
        }

        .floating-heart:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 36px rgba(108, 0, 27, 0.15);
        }

        @keyframes heartPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .floating-heart svg {
            width: 28px;
            height: 28px;
            fill: var(--color-primary);
        }

        /* ===== FOOTER ===== */
        .footer {
            background-color: var(--color-footer-bg);
            padding: 48px 50px;
            text-align: center;
        }

        .footer-logo {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 400;
            font-size: 1.1rem;
            color: var(--color-primary-light);
            margin-bottom: 12px;
            letter-spacing: 0.02em;
        }

        .footer-tagline {
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--color-primary-light);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 120px 30px 60px;
            }

            .hero-content {
                max-width: 100%;
                padding-right: 0;
                margin-bottom: 40px;
            }

            .hero-image-wrapper {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                width: 320px;
                height: 400px;
                margin: 0 auto;
            }

            .hero-image-container {
                clip-path: path('M0 215.85C0 98.849 94.848 4 211.85 4C328.85 4 423.7 98.849 423.7 215.85V584H290C129.837 584 0 454.163 0 294V215.85Z');
            }

            .floating-heart {
                right: 20px;
                bottom: 30px;
                width: 56px;
                height: 56px;
            }

            .floating-heart svg {
                width: 22px;
                height: 22px;
            }

            .btn-primary {
                margin: 0 auto;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 24px;
                height: 64px;
            }

            .nav {
                gap: 20px;
            }

            .nav-link {
                font-size: 0.78rem;
            }

            .hero {
                padding: 100px 24px 40px;
            }

            .hero-image-wrapper {
                width: 260px;
                height: 340px;
            }

            .hero-image-container {
                clip-path: path('M0 130C0 58.2 58.2 0 130 0C201.8 0 260 58.2 260 130V360H178C79.6 360 0 280.4 0 182V130Z');
            }

            .footer {
                padding: 36px 24px;
            }
        }

        @media (max-width: 480px) {
            .nav-link:not(.active) {
                display: none;
            }

            .hero-title {
                font-size: 2.8rem;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header" id="header">
        <a href="#" class="logo">Para mi Angie</a>
        <nav class="nav">
            <a href="#" class="nav-link active">calma</a>
            <a href="#" class="nav-link">continuara</a>
            <a href="#" class="nav-link">continuara</a>
        </nav>
        <nav class="nav">
            <a href="#" class="nav-heart" aria-label="Love">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                </svg>
            </a>
        </nav>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <main class="hero" id="hero">
        <div class="hero-content">
            <h1 class="hero-title">Para mi<br>Angie</h1>
            <p class="hero-subtitle">No creas todo lo que dice tu cabecita</p>
            <a href="#footer" class="btn-primary">
                PRONTO
                <span class="btn-arrow">↓</span>
            </a>
        </div>

        <div class="hero-image-wrapper">
            <div class="hero-image-container">
                <img src="rabbit_stars.png" alt="Conejito bajo las estrellas" class="hero-image" loading="eager">
            </div>
        </div>

        <!-- Floating Heart Button -->
        <div class="floating-heart" id="floatingHeart" aria-label="Love">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer" id="footer">
        <p class="footer-logo">Para mi Angie</p>
        <p class="footer-tagline">MI MUSA, MI COMPAÑERA, MI TODO.</p>
    </footer>

    <script>
        // Preload heart-click sound
        const heartSound = new Audio('0001.mp3');
        heartSound.preload = 'auto';

        // Floating heart: animation + sound
        const heart = document.getElementById('floatingHeart');
        if (heart) {
            heart.addEventListener('click', () => {
                // Play sound (reset to start so rapid clicks work)
                heartSound.currentTime = 0;
                heartSound.play();

                // Pulse animation
                heart.style.animation = 'none';
                heart.offsetHeight; // trigger reflow
                heart.style.animation = 'heartPulse 0.4s ease-in-out 3';
                setTimeout(() => {
                    heart.style.animation = 'heartPulse 2s ease-in-out infinite';
                }, 1200);
            });
        }

        // Smooth entrance animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.hero-title, .hero-subtitle, .btn-primary').forEach((el) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
            observer.observe(el);
        });

        // Stagger animation delays
        const title = document.querySelector('.hero-title');
        const subtitle = document.querySelector('.hero-subtitle');
        const btn = document.querySelector('.btn-primary');
        if (title) title.style.transitionDelay = '0.1s';
        if (subtitle) subtitle.style.transitionDelay = '0.3s';
        if (btn) btn.style.transitionDelay = '0.5s';
    </script>

</body>

</html>
